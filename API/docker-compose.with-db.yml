services:
  db:
    image: postgres:16-alpine
    container_name: contratos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-Contratos}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-Contratos}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432

volumes:
  postgres_data:
