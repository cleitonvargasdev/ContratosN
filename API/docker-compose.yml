services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contratos-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      TZ: America/Sao_Paulo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8007"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8007"]

  web:
    build:
      context: ..
      dockerfile: API/docker/frontend-nginx.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: contratos-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    ports:
      - "8080:80"
